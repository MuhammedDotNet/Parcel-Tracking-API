version: '3.8'

services:
  # PostgreSQL 17 for ParcelTracking
  postgres:
    image: postgres:17
    container_name: parceltracking-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-parceltracking}
      POSTGRES_USER: ${DB_USER:-parcel}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-parcel123}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "${DB_PORT:-5434}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-parcel} -d ${DB_NAME:-parceltracking}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - parceltracking-network
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"

volumes:
  postgres_data:
    driver: local

networks:
  parceltracking-network:
    driver: bridge
